name: ThyroidReport
options:
  bundleIdPrefix: com.tiroidrapor
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.3"

settings:
  base:
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: false
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ThyroidReport:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/ThyroidReport
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcons
    resources:
      - path: Resources/Info.plist
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tiroidrapor.ThyroidReport
        PRODUCT_NAME: Tiroid Rapor
        CODE_SIGN_STYLE: Manual
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
