name: ThyroidReport

options:
  bundleIdPrefix: com.tiroidrapor
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  xcodeCompatibilityVersion: "Xcode 14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.tiroidrapor.ThyroidReport
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""   # Buraya Apple Developer Team ID'nizi girin

targets:
  ThyroidReport:
    type: application
    platform: iOS
    sources:
      - path: Sources/ThyroidReport
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Tiroid Rapor
        CFBundleDisplayName: Tiroid Rapor
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        # Gizlilik izinleri (zorunlu)
        NSMicrophoneUsageDescription: "Tiroid ultrason bulgularını sesle girmek için mikrofon erişimi gereklidir."
        NSSpeechRecognitionUsageDescription: "Konuşmanızı metne dönüştürmek için Apple'ın konuşma tanıma servisi kullanılacaktır."
        # Dosyalar uygulamasına erişim
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"    # iPhone
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tiroidrapor.ThyroidReport
