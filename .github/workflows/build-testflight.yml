name: Build and Upload to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:

    - name: Kodu İndir
      uses: actions/checkout@v4

    - name: Xcode Seç
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.3'

    - name: XcodeGen Kur
      run: brew install xcodegen

    - name: Uygulama İkonu Oluştur
      run: |
        mkdir -p Resources/Assets.xcassets/AppIcon.appiconset
        echo '{"info": {"author": "xcode", "version": 1}}' > Resources/Assets.xcassets/Contents.json
        python3 << 'PYEOF'
        from PIL import Image, ImageDraw, ImageFont
        import json

        sizes = [20,29,40,58,60,76,80,87,120,152,167,180,1024]
        out = "Resources/Assets.xcassets/AppIcon.appiconset"

        for s in sizes:
            img = Image.new('RGB', (s,s), (13,71,161))
            d = ImageDraw.Draw(img)
            m = s*0.08
            d.ellipse([m,m,s-m,s-m], fill=(25,118,210))
            fs = int(s*0.55)
            try:
                font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", fs)
            except:
                font = ImageFont.load_default()
            bb = d.textbbox((0,0),"T",font=font)
            x=(s-(bb[2]-bb[0]))/2-bb[0]; y=(s-(bb[3]-bb[1]))/2-bb[1]
            d.text((x,y),"T",fill=(255,255,255),font=font)
            img.save(f"{out}/icon_{s}.png")

        contents = {"images":[
            {"idiom":"iphone","scale":"2x","size":"20x20","filename":"icon_40.png"},
            {"idiom":"iphone","scale":"3x","size":"20x20","filename":"icon_60.png"},
            {"idiom":"iphone","scale":"2x","size":"29x29","filename":"icon_58.png"},
            {"idiom":"iphone","scale":"3x","size":"29x29","filename":"icon_87.png"},
            {"idiom":"iphone","scale":"2x","size":"40x40","filename":"icon_80.png"},
            {"idiom":"iphone","scale":"3x","size":"40x40","filename":"icon_120.png"},
            {"idiom":"iphone","scale":"2x","size":"60x60","filename":"icon_120.png"},
            {"idiom":"iphone","scale":"3x","size":"60x60","filename":"icon_180.png"},
            {"idiom":"ipad","scale":"1x","size":"20x20","filename":"icon_20.png"},
            {"idiom":"ipad","scale":"2x","size":"20x20","filename":"icon_40.png"},
            {"idiom":"ipad","scale":"1x","size":"29x29","filename":"icon_29.png"},
            {"idiom":"ipad","scale":"2x","size":"29x29","filename":"icon_58.png"},
            {"idiom":"ipad","scale":"1x","size":"40x40","filename":"icon_40.png"},
            {"idiom":"ipad","scale":"2x","size":"40x40","filename":"icon_80.png"},
            {"idiom":"ipad","scale":"1x","size":"76x76","filename":"icon_76.png"},
            {"idiom":"ipad","scale":"2x","size":"76x76","filename":"icon_152.png"},
            {"idiom":"ipad","scale":"2x","size":"83.5x83.5","filename":"icon_167.png"},
            {"idiom":"ios-marketing","scale":"1x","size":"1024x1024","filename":"icon_1024.png"}
        ],"info":{"author":"xcode","version":1}}
        with open(f"{out}/Contents.json","w") as f:
            json.dump(contents,f,indent=2)
        print("İkonlar hazır!")
        PYEOF

    - name: Xcode Projesi Oluştur
      run: xcodegen generate

    - name: Sertifika ve Profil Kur
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" \
          -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

    - name: Archive Oluştur
      run: |
        xcodebuild archive \
          -project ThyroidReport.xcodeproj \
          -scheme ThyroidReport \
          -configuration Release \
          -archivePath $RUNNER_TEMP/ThyroidReport.xcarchive \
          -destination "generic/platform=iOS" \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
          -allowProvisioningUpdates

    - name: ExportOptions Oluştur
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>${{ secrets.TEAM_ID }}</string>
          <key>uploadBitcode</key>
          <false/>
          <key>compileBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <true/>
          <key>signingStyle</key>
          <string>manual</string>
          <key>provisioningProfiles</key>
          <dict>
            <key>com.tiroidrapor.ThyroidReport</key>
            <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
          </dict>
        </dict>
        </plist>
        EOF

    - name: IPA Dışa Aktar
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/ThyroidReport.xcarchive \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export \
          -allowProvisioningUpdates
        find $RUNNER_TEMP/export -type f

    - name: TestFlight'a Yükle
      env:
        APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode \
          -o ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
        IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
        echo "IPA yolu: $IPA_PATH"
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "$APP_STORE_CONNECT_KEY_ID" \
          --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

    - name: Temizlik
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
