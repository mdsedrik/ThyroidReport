name: Build and Upload to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:

    - name: Kodu İndir
      uses: actions/checkout@v4

    - name: Xcode Seç
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.3'

    - name: XcodeGen Kur
      run: brew install xcodegen

    - name: Uygulama İkonu Oluştur
      run: |
        mkdir -p Resources/Assets.xcassets/AppIcon.appiconset
        echo '{"info": {"author": "xcode", "version": 1}}' > Resources/Assets.xcassets/Contents.json

        # 1024x1024 temel ikon oluştur (sips ile)
        BASE=/tmp/base_icon.png
        python3 -c "
        import struct, zlib, base64

        def png_chunk(name, data):
            c = zlib.crc32(name + data) & 0xffffffff
            return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)

        w, h = 1024, 1024
        raw = b''
        for y in range(h):
            raw += b'\x00'
            for x in range(w):
                # Koyu mavi arka plan
                cx, cy = w//2, h//2
                dist = ((x-cx)**2 + (y-cy)**2) ** 0.5
                if dist < w*0.42:
                    # Açık mavi daire
                    # T harfi bölgesi
                    tx1,tx2 = int(w*0.25), int(w*0.75)
                    ty1,ty2 = int(h*0.2), int(h*0.35)
                    bx1,bx2 = int(w*0.43), int(w*0.57)
                    by1,by2 = int(h*0.2), int(h*0.8)
                    if (ty1<=y<=ty2 and tx1<=x<=tx2) or (by1<=y<=by2 and bx1<=x<=bx2):
                        raw += bytes([255,255,255,255])
                    else:
                        raw += bytes([25,118,210,255])
                else:
                    raw += bytes([13,71,161,255])

        ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
        compressed = zlib.compress(raw)
        data = (b'\x89PNG\r\n\x1a\n'
                + png_chunk(b'IHDR', ihdr)
                + png_chunk(b'IDAT', compressed)
                + png_chunk(b'IEND', b''))
        open('$BASE','wb').write(data)
        print('Base icon created')
        "

        # Tüm boyutları sips ile oluştur
        OUT=Resources/Assets.xcassets/AppIcon.appiconset
        for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
          sips -z $SIZE $SIZE $BASE --out $OUT/icon_${SIZE}.png > /dev/null
        done

        # Contents.json yaz
        cat > $OUT/Contents.json << 'EOF'
        {
          "images": [
            {"idiom":"iphone","scale":"2x","size":"20x20","filename":"icon_40.png"},
            {"idiom":"iphone","scale":"3x","size":"20x20","filename":"icon_60.png"},
            {"idiom":"iphone","scale":"2x","size":"29x29","filename":"icon_58.png"},
            {"idiom":"iphone","scale":"3x","size":"29x29","filename":"icon_87.png"},
            {"idiom":"iphone","scale":"2x","size":"40x40","filename":"icon_80.png"},
            {"idiom":"iphone","scale":"3x","size":"40x40","filename":"icon_120.png"},
            {"idiom":"iphone","scale":"2x","size":"60x60","filename":"icon_120.png"},
            {"idiom":"iphone","scale":"3x","size":"60x60","filename":"icon_180.png"},
            {"idiom":"ipad","scale":"1x","size":"20x20","filename":"icon_20.png"},
            {"idiom":"ipad","scale":"2x","size":"20x20","filename":"icon_40.png"},
            {"idiom":"ipad","scale":"1x","size":"29x29","filename":"icon_29.png"},
            {"idiom":"ipad","scale":"2x","size":"29x29","filename":"icon_58.png"},
            {"idiom":"ipad","scale":"1x","size":"40x40","filename":"icon_40.png"},
            {"idiom":"ipad","scale":"2x","size":"40x40","filename":"icon_80.png"},
            {"idiom":"ipad","scale":"1x","size":"76x76","filename":"icon_76.png"},
            {"idiom":"ipad","scale":"2x","size":"76x76","filename":"icon_152.png"},
            {"idiom":"ipad","scale":"2x","size":"83.5x83.5","filename":"icon_167.png"},
            {"idiom":"ios-marketing","scale":"1x","size":"1024x1024","filename":"icon_1024.png"}
          ],
          "info": {"author":"xcode","version":1}
        }
        EOF
        echo "İkonlar hazır!"
        ls $OUT

    - name: Xcode Projesi Oluştur
      run: xcodegen generate

    - name: Sertifika ve Profil Kur
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" \
          -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

     - name: Archive Oluştur
       run: |
        xcodebuild archive \
          -project ThyroidReport.xcodeproj \
          -scheme ThyroidReport \
          -configuration Release \
          -sdk iphoneos \
          -archivePath $RUNNER_TEMP/ThyroidReport.xcarchive \
          -destination "generic/platform=iOS" \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
          EXCLUDED_ARCHS="" \
          -allowProvisioningUpdates

    - name: ExportOptions Oluştur
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>${{ secrets.TEAM_ID }}</string>
          <key>uploadBitcode</key>
          <false/>
          <key>compileBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <true/>
          <key>signingStyle</key>
          <string>manual</string>
          <key>provisioningProfiles</key>
          <dict>
            <key>com.tiroidrapor.ThyroidReport</key>
            <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
          </dict>
        </dict>
        </plist>
        EOF

    - name: IPA Dışa Aktar
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/ThyroidReport.xcarchive \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export \
          -allowProvisioningUpdates
        find $RUNNER_TEMP/export -type f

    - name: TestFlight'a Yükle
      env:
        APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode \
          -o ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
        IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
        echo "IPA yolu: $IPA_PATH"
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "$APP_STORE_CONNECT_KEY_ID" \
          --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

    - name: Temizlik
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
